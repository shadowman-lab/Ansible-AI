---
- name: fix httpd
  hosts: dynatrace
  tasks:
    - name: remove line
      ansible.builtin.lineinfile:
        path: /etc/httpd/conf/httpd.conf
        regexp: ^InvalidDirectiveHere
        state: absent
    - name: restart httpd
      ansible.builtin.service:
        name: httpd
        state: restarted
