---
- name: Get current memory usage if Linux
  ansible.builtin.shell:
    cmd: free -h
    executable: /bin/bash
  changed_when: false
  when: os is match("rhel.*") or os == "Red Hat BYOL Linux"
  register: memoryusage

- name: Get Memory Usage
  ansible.windows.win_shell: |
    Get-CimInstance Win32_OperatingSystem | Select-Object `
      @{Name = "Total(GB)"; Expression = { [math]::round($_.TotalVisibleMemorySize / 1mb, 2) }}, `
      @{Name = "Free(GB)"; Expression = { [math]::round($_.FreePhysicalMemory / 1mb, 2) }}, `
      @{Name = "Used(GB)"; Expression = { [math]::round(($_.TotalVisibleMemorySize - $_.FreePhysicalMemory) / 1mb, 2) }}
  changed_when: false
  when: os is match("windows.*") or os is match("2016.*") or os == "Windows"
  register: memoryusagewin

- name: Set stats for next controller job Linux
  ansible.builtin.set_stats:
    data:
      service_log_output: "\"{{ memoryusage.stdout }}\""
      max_tokens: 2000
  when: os is match("rhel.*") or os == "Red Hat BYOL Linux"

- name: Set stats for next controller job Windows
  ansible.builtin.set_stats:
    data:
      service_log_output: "\"{{ memoryusagewin.stdout }}\""
      max_tokens: 2000
  when: os is match("windows.*") or os is match("2016.*") or os == "Windows"
