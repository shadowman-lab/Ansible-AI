---
- name: Restart httpd service
  hosts: dynatrace.shadowman.dev
  tasks:
    - name: Copy httpd.conf file
      ansible.builtin.copy:
        src: files/httpd.conf
        dest: /etc/httpd/conf/httpd.conf
    - name: Restart httpd service
      ansible.builtin.service:
        name: httpd
        state: restarted
